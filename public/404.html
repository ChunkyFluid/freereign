<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | FreeReign</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f14;
      color: #e8e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
    p { color: #9896a8; margin-bottom: 28px; line-height: 1.6; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: #fff;
      text-decoration: none;
      transition: transform 200ms, box-shadow 200ms;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
    }
    .links {
      margin-top: 24px;
      font-size: 0.85rem;
    }
    .links a {
      color: #0d9488;
      text-decoration: none;
      margin: 0 10px;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The URL might be wrong, or the page may have moved. Try one of the links below.</p>
    <a class="btn" href="/">← Back to FreeReign</a>
    <div class="links">
      <a href="/tools/">All Tools</a>
      <a href="/blog/">Blog</a>
    </div>
  </div>
</body>
</html>
